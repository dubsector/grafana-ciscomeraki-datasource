name: Build and Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build plugin
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: false

      - name: Install mage
        run: go install github.com/magefile/mage@latest

      - name: Install npm dependencies
        run: npm install

      - name: Type check
        run: npm run typecheck

      - name: Build frontend
        run: npm run build

      - name: Tidy Go modules
        run: go mod tidy

      - name: Build backend
        run: mage -v

      - name: Package plugin
        id: package
        run: |
          PLUGIN_ID=dubsector-ciscomeraki-datasource
          cp -r dist "${PLUGIN_ID}"
          zip -r "${PLUGIN_ID}.zip" "${PLUGIN_ID}/"
          echo "zip=${PLUGIN_ID}.zip" >> $GITHUB_OUTPUT

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin-zip
          path: ${{ steps.package.outputs.zip }}
          retention-days: 7

  release:
    name: Create release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: plugin-zip

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: '*.zip'
          generate_release_notes: true
